openapi: 3.0.0
info:
  title: Order Processing System API
  version: 1.0.0
  description: API for managing orders, products, and users.
servers:
  - url: http://localhost:5000/api
paths:
  /auth/login:
    post:
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Successful login
  /products:
    get:
      summary: Get all products
      responses:
        '200':
          description: A list of products
  /orders:
    get:
      summary: Get all orders
      security:
        - bearerAuth: []
      responses:
        '200':
          description: A list of orders
    post:
      summary: Create a new order
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                customer_id:
                  type: integer
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      product_id:
                        type: integer
                      quantity:
                        type: integer
                      unit_price:
                        type: number
      responses:
        '201':
          description: Order created
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
